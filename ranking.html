<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding Ranking</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">


<link rel="stylesheet" href="ranking.css">
</head>

<body>

<!-- 波 -->
<div class="waves">
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<!-- 待機画面 -->
<div id="waitingScreen">
  <div class="waiting-icon">
    <img src="mermaid-icon.png" alt="mermaid" style="width:150px;height:auto;filter:drop-shadow(0 0 12px rgba(41,182,216,0.8)) drop-shadow(0 0 28px rgba(41,182,216,0.4));">
  </div>
  <p class="waiting-title">Ranking</p>
  <p class="waiting-sub">もうすぐ発表されます<br>このまましばらくお待ちください</p>
</div>

<!-- カウントダウン -->
<div id="countdownScreen">
  <p class="countdown-label">Ranking Reveal</p>
  <div id="countdownNumber" class="countdown-number">5</div>
</div>

<!-- 戻るボタン（ランキング表示時のみ表示） -->
<button id="backBtn" class="back-btn" style="display:none" onclick="window.location.href='index.html'">← アルバムへ</button>

<!-- ランキング -->
<div id="rankingScreen">
  <div class="ranking-header">
    <p class="ranking-eyebrow">Best Shot Award</p>
    <h1 class="ranking-title">Ranking</h1>
  </div>
  <div id="rankList" class="rank-list"></div>
</div>

<!-- 自分が1位のバナー -->
<div id="winnerBanner">
  <div class="winner-emoji">👑</div>
  <p class="winner-title">Best Shot !</p>
  <p class="winner-sub">あなたの一枚が、みんなの心をつかみました<br>素敵な瞬間を残してくれてありがとうございます<br><br>ぜひ新郎新婦から景品をお受け取りください</p>
  <button class="winner-close" onclick="document.getElementById('winnerBanner').classList.remove('show')">ランキングを見る</button>
</div>

<script type="module" src="ranking.js"></script>
</body>
</html>
