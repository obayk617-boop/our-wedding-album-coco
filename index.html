<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Wedding Album</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>Wedding Album</h1>

  <hr />

  <div id="gallery"></div>

  <!-- 画像拡大ビュー -->
  <div id="viewer">
    <img id="viewerImg">
  </div>

  <script type="module" src="app.js"></script>
  <!-- ＋ボタン -->
  <div id="fab">＋</div>

  <!-- メニュー -->
  <div id="menu" class="hidden">
    <button id="cameraBtn">📷 カメラ</button>
    <button id="fileBtn">🖼 アルバム</button>
  </div>

  <!-- 確認モーダル -->
  <div id="previewModal" class="hidden">
    <div class="modalContent">
      <img id="previewImage">
      <p id="uploadStatus"></p>
      <br>
      <button id="confirmUpload">アップロード</button>
      <button id="cancelUpload">キャンセル</button>
    </div>
  </div>

  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="fileSelectInput" accept="image/*" hidden>
</body>
</html>
