<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Wedding Album</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <meta name="theme-color" content="#29b6d8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wedding Album" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ヘッダー -->
  <header class="header">
    <p class="header-eyebrow">Our Special Day</p>
    <h1 class="header-title">Wedding Album</h1>
    <p class="subtitle">写真をタップして保存できます</p>

    <!-- 席番号バッジ -->
    <div class="seat-badge-wrap">
      <span id="seatBadge" class="seat-badge"></span>
    </div>

    <div class="header-message">
      <p>ふたりからのお願いです。</p>
      <p>何気ない一枚・面白い一枚、どんな写真も大歓迎。<br>みなさんの目線で見た今日を残してください。</p>
    </div>
  </header>

  <!-- ギャラリー -->
  <main class="gallery-container">
    <div id="gallery" class="gallery"></div>
  </main>

  <!-- 画像拡大ビュー -->
  <div id="viewer" class="modal hidden">
    <div class="modal-content">
      <h2>Wedding Photo</h2>
      <img id="viewerImg" alt="Wedding Photo">
      <div class="button-group">
        <button id="downloadBtn" class="btn btn-primary">保存する</button>
        <button id="closeViewer" class="btn btn-secondary">閉じる</button>
      </div>
    </div>
  </div>

  <!-- ＋ボタン -->
  <div id="fab" class="fab">＋</div>


  <!-- アップロード確認モーダル -->
  <div id="previewModal" class="modal hidden">
    <div class="modal-content">
      <h2>写真をアップロード</h2>
      <img id="previewImage" alt="Preview">
      <p id="uploadStatus" class="status-text"></p>
      <div id="spinner" class="spinner hidden"></div>
      <div class="button-group">
        <button id="confirmUpload" class="btn btn-primary">アップロード</button>
        <button id="cancelUpload" class="btn btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- input -->
  <input type="file" id="fileSelectInput" accept="image/*" hidden>

  <script type="module" src="app.js"></script>
</body>
</html>
