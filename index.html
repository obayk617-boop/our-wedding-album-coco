<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Wedding Album</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#ff4081" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wedding Album" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ヘッダー -->
  <header class="header">
    <h1>💍 Wedding Album</h1>
    <p class="subtitle">写真を保存：タップしてダウンロード📥 or 長押しして保存💾</p>
  </header>

  <!-- ギャラリー -->
  <main class="gallery-container">
    <div id="gallery" class="gallery"></div>
  </main>

  <!-- 画像拡大ビュー -->
  <div id="viewer" class="viewer hidden">

    <button id="closeViewer" class="close-btn">✕</button>

    <div class="viewer-content">
      <img id="viewerImg" alt="Wedding Photo">
      <button id="downloadBtn" class="download-btn">📥 保存</button>
    </div>

  </div>

  <!-- ＋ボタン -->
  <div id="fab" class="fab">＋</div>

  <!-- メニュー -->
  <div id="menu" class="menu hidden">
    <button id="cameraBtn" class="menu-btn">📷 カメラで撮影</button>
    <button id="fileBtn" class="menu-btn">🖼 アルバムから選択</button>
  </div>

  <!-- アップロード確認モーダル -->
  <div id="previewModal" class="modal hidden">
    <div class="modal-content">
      <h2>写真をアップロード</h2>

      <img id="previewImage" alt="Preview">

      <p id="uploadStatus" class="status-text"></p>
      <div id="spinner" class="spinner hidden"></div>

      <div class="button-group">
        <button id="confirmUpload" class="btn btn-primary">✓ アップロード</button>
        <button id="cancelUpload" class="btn btn-secondary">✕ キャンセル</button>
      </div>

    </div>
  </div>

  <!-- input -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="fileSelectInput" accept="image/*" hidden>

  <!-- JSは最後 -->
  <script type="module" src="app.js"></script>

</body>
</html>
