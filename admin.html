<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:sans-serif;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}

.card{
  position:relative;
}

img{
  width:100%;
  border-radius:8px;
}

button{
  position:absolute;
  bottom:5px;
  left:5px;
  background:red;
  color:white;
  border:none;
  padding:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>🔒 Admin Panel</h2>

<div id="gallery" class="grid"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const ADMIN_PASSWORD = "0828"; // ←好きなパスワード

const pass = prompt("管理者パスワード");

if(pass !== ADMIN_PASSWORD){
  document.body.innerHTML="アクセス拒否";
  throw new Error("unauthorized");
}

const supabaseClient = createClient(
"https://vysdoicwyroygakdrwyt.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5c2RvaWN3eXJveWdha2Ryd3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NDExMzEsImV4cCI6MjA4NzIxNzEzMX0.uBpCtpMy8pIHTi0bU3GkwcquW-15QcQOr6Pw58TNlAw"
);

const gallery=document.getElementById("gallery");

async function loadImages(){

const {data,error}=await supabaseClient.storage
.from("photos")
.list("",{sortBy:{column:"created_at",order:"desc"}});

gallery.innerHTML="";

data.forEach(file=>{

const {data:urlData}=supabaseClient.storage
.from("photos")
.getPublicUrl(file.name);

const card=document.createElement("div");
card.className="card";

const img=document.createElement("img");
img.src=urlData.publicUrl;

const btn=document.createElement("button");
btn.textContent="削除";

btn.onclick=async()=>{
if(!confirm("削除しますか？")) return;

await supabaseClient.storage
.from("photos")
.remove([file.name]);

loadImages();
};

card.appendChild(img);
card.appendChild(btn);
gallery.appendChild(card);

});

}

loadImages();

</script>

</body>
</html>
